name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Delete package-lock files
        run: |
          if (Test-Path "package-lock.json") { Remove-Item "package-lock.json" }
          if (Test-Path "src/renderer/package-lock.json") { Remove-Item "src/renderer/package-lock.json" }

      - name: Install main dependencies
        run: npm install --legacy-peer-deps

      - name: Install renderer dependencies
        run: npm install --legacy-peer-deps --prefix src/renderer

      - name: Build renderer
        run: npm run build --prefix src/renderer

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always
